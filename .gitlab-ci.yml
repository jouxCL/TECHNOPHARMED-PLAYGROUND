image: node:20

stages:
  - install
  - build

cache:
  paths:
    - node_modules/

before_script:
  - npm ci

install_dependencies:
  stage: install
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/

build_project:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - main
    - master

# ──────────────────────────────────────────────────────────────────
# DigitalOcean App Platform detecta automáticamente el repositorio.
# Configura lo siguiente en el panel de DigitalOcean:
#   Build Command : npm run build
#   Run Command   : node ./dist/server/entry.mjs
#   HTTP Port     : 4321  (o la variable PORT que DO asigne)
# ──────────────────────────────────────────────────────────────────